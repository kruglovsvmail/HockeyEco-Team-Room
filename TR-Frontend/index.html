<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="color-scheme" content="dark light" />
    
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HockeyEco" />
    
    <meta id="theme-meta" name="theme-color" content="#f3f4f6" />

    <title>HockeyEco | Кабинет команды</title>

    <script>
      /* 🚀 ЗАЩИТА ОТ ВСПОЛОХА БЕЛОГО ЭКРАHА ПРИ ХОЛОДHОМ СТАРТЕ PWA */
      (function () {
        const savedTheme = localStorage.getItem('tr_theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
          document.querySelector('#theme-meta')?.setAttribute('content', '#242424');
        } else {
          document.documentElement.classList.remove('dark');
          document.querySelector('#theme-meta')?.setAttribute('content', '#f3f4f6');
        }
      })();
    </script>

    <style>
      /* 🎨 ФОH СТРАHИЦЫ ВО ВРЕМЯ ВРАЩЕHИЯ ЛОУДЕРА И ХОЛОДHОГО СТАРТА.
         Фон body также задаёт цвет нижней системной панели навигации Android в standalone-PWA.
         Значения зашиты явно (а не через CSS-переменную), чтобы на тёмной теме при
         холодном старте не мелькнула светлая панель до загрузки основного бандла стилей. */
      html, body {
        background-color: #f3f4f6;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      html.dark, html.dark body {
        background-color: #242424;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
