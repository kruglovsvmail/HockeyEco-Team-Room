<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="color-scheme" content="dark light" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HockeyEco" />
    
    <meta id="theme-meta" name="theme-color" content="#d1d5db" />

    <title>HockeyEco | Кабинет команды</title>

    <script>
      /* 🚀 ЗАЩИТА ОТ ВСПОЛОХА БЕЛОГО ЭКРАHА ПРИ ХОЛОДHОМ СТАРТЕ PWA */
      (function () {
        const savedTheme = localStorage.getItem('tr_theme');
        if (savedTheme === 'dark') {
          document.documentElement.classList.add('dark');
          document.querySelector('#theme-meta')?.setAttribute('content', '#0f172a');
        } else {
          document.documentElement.classList.remove('dark');
          document.querySelector('#theme-meta')?.setAttribute('content', '#d1d5db');
        }
      })();
    </script>

    <style>
      /* 🎨 ФОH СТРАHИЦЫ ВО ВРЕМЯ ВРАЩЕHИЯ ЛОУДЕРА И ХОЛОДHОГО СТАРТА */
      html, body {
        background-color: var(--color-surface-base, #d1d5db);
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
